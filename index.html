<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body>
    <div class="container">
        <div id="fondo">
            <div id="pantalla">
                <p id="texto-de-pantalla">12345</p>
            </div>
            <div id="panel-numerico">
                <div id="fila1" class="filas">
                    <button class="button" id="AC" class="gris">AC</button>
                    <button class="button" id="porcentaje" class="gris">%</button>
                    <button class="button" id="D" class="gris">⌫</button>
                    <button class="button" id="dividir" class="amarillo">÷</button>
                </div>
                <div id="fila2" class="filas">
                    <button class="button" id="siete" class="negro">7</button>
                    <button class="button" id="ocho"class="negro">8</button>
                    <button class="button" id="nueve" class="negro">9</button>
                    <button class="button" id="por" class="amarillo">x</button>
                </div>
                <div id="fila3" class="filas">
                    <button class="button" id="cuatro" class="negro">4</button>
                    <button class="button" id="cinco" class="negro">5</button>
                    <button class="button" id="seis" class="negro">6</button>
                    <button class="button" id="menos" class="amarillo">-</button>
                </div>
                <div id="fila4" class="filas">
                    <button class="button" id="uno" class="negro">1</button>
                    <button class="button" id="dos" class="negro">2</button>
                    <button class="button" id="tres" class="negro">3</button>
                    <button class="button" id="mas" class="amarillo">+</button>
                </div>
                <div id="fila5" class="filas">
                    <button class="button" id="cero" class="negro">0</button>
                    <button class="button" id="punto" class="negro">.</button>
                    <button class="button" id="igual" class="amarillo">=</button>
                </div>
            </div>
        </div>


    </div>
    <script src="code.js"></script>
</body>
</html>
